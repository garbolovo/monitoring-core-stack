# my global config
global:
  scrape_interval: 15s # Set the scrape interval to every 15 seconds. Default is every 1 minute.
  evaluation_interval: 15s # Evaluate rules every 15 seconds. The default is every 1 minute.
  # scrape_timeout is set to the global default (10s).

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

# Load rules once and periodically evaluate them according to the global 'evaluation_interval'.
rule_files:
# - "first_rules.yml"
# - "second_rules.yml"

scrape_configs:
  # Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # node_exporter hosts
  - job_name: "node_exporter"
    static_configs:
      - targets:
          - "node-exporter:9100"
          - "80.90.178.17:9100"
          - "185.230.191.112:9100"

  # cAdvisor hosts
  - job_name: "cadvisor"
    static_configs:
      - targets:
          - "194.226.49.20:8081"
          - "185.230.191.112:8081"

  # Blackbox checks from two probe hosts.

  # HTTP (fon.bet) через обычный http_2xx
  - job_name: "blackbox_http_194"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://fon.bet
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 194.226.49.20:9115
      - target_label: blackbox_host
        replacement: "194.226.49.20"

  - job_name: "blackbox_http_185"
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://fon.bet
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 185.230.191.112:9115
      - target_label: blackbox_host
        replacement: "185.230.191.112"

  # HTTP (speedtest.net) с «человеческим» UA — смотри модуль http_ok_ua в blackbox.yml
  - job_name: "blackbox_http_speedtest_194"
    metrics_path: /probe
    params:
      module: [http_ok_ua]
    static_configs:
      - targets:
          - https://www.speedtest.net
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 194.226.49.20:9115
      - target_label: blackbox_host
        replacement: "194.226.49.20"

  - job_name: "blackbox_http_speedtest_185"
    metrics_path: /probe
    params:
      module: [http_ok_ua]
    static_configs:
      - targets:
          - https://www.speedtest.net
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 185.230.191.112:9115
      - target_label: blackbox_host
        replacement: "185.230.191.112"

  # ICMP (8.8.8.8) из двух точек
  - job_name: "blackbox_icmp_194"
    metrics_path: /probe
    params:
      module: [icmp_ping]
    static_configs:
      - targets: ['8.8.8.8']
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 194.226.49.20:9115
      - target_label: blackbox_host
        replacement: "194.226.49.20"

  - job_name: "blackbox_icmp_185"
    metrics_path: /probe
    params:
      module: [icmp_ping]
    static_configs:
      - targets: ['8.8.8.8']
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 185.230.191.112:9115
      - target_label: blackbox_host
        replacement: "185.230.191.112"

  # TCP (SSH 22) из двух точек к 185.230.191.112
  - job_name: "blackbox_tcp_194"
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
          - "185.230.191.112:22"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 194.226.49.20:9115
      - target_label: blackbox_host
        replacement: "194.226.49.20"

  - job_name: "blackbox_tcp_185"
    metrics_path: /probe
    params:
      module: [tcp_connect]
    static_configs:
      - targets:
          - "185.230.191.112:22"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 185.230.191.112:9115
      - target_label: blackbox_host
        replacement: "185.230.191.112"
